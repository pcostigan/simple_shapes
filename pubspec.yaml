name: simple_shapes
version: 1.0.3

description:
  Flutter widget library offering geometric shapes (polygons, stars, badges, and more) with 
  customizable colors, borders, shadows, corner rounding, and theming.

repository: https://github.com/pcostigan/simple_shapes
issue_tracker: https://github.com/pcostigan/simple_shapes/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
