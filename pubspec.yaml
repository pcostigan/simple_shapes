name: simple_shapes
version: 1.0.1

description:
  A comprehensive Flutter widget library providing a wide variety of geometric
  shapes with customizable properties like colors, borders, shadows, and corner
  rounding. Includes polygons, stars, badges, and more. All shapes are themable.

repository: https://github.com/pcostigan/simple_shapes
issue_tracker: https://github.com/pcostigan/simple_shapes/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
